<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Kim Ngọc PRO</title>

<style>
body { font-family: sans-serif; margin:0; background:#f5f5f5;}
.container { max-width:600px; margin:auto; padding:10px;}

.box { background:#fff; padding:10px; margin-bottom:10px; border-radius:10px;}

input, select {
  width:100%; padding:8px; margin-bottom:5px;
  border-radius:6px; border:1px solid #ddd;
}

button {
  padding:10px; border:none; border-radius:8px;
  background:#28a745; color:#fff; font-weight:bold;
}

.product { display:flex; justify-content:space-between; padding:8px; background:#fff; margin-bottom:5px; border-radius:8px;}
.cart-item { border-bottom:1px solid #eee; padding:5px;}

.total { font-size:18px; font-weight:bold; color:red;}
</style>
</head>

<body>
<div class="container">

<div class="box">
<h3>Khách hàng</h3>
<select id="customer"></select>

<input id="c_name" placeholder="Tên khách">
<select id="c_group">
<option>Khách Lẻ</option>
<option>Khách Sỉ</option>
</select>
<button onclick="addCustomer()">+ Thêm khách</button>
</div>

<div class="box">
<h3>Sản phẩm</h3>
<input id="p_id" placeholder="Mã">
<input id="p_name" placeholder="Tên">
<input id="p_le" placeholder="Giá lẻ">
<input id="p_si" placeholder="Giá sỉ">
<button onclick="addProduct()">Lưu sản phẩm</button>
</div>

<div id="products"></div>

<div class="box">
<h3>Giỏ hàng</h3>
<div id="cart"></div>

<div class="total">Tổng: <span id="total">0</span> đ</div>

<input id="discount" placeholder="Giảm giá">
<input id="cash" placeholder="Tiền khách đưa">

<div>Tiền thối: <span id="change">0</span> đ</div>

<button onclick="saveOrder()">💾 Lưu đơn</button>
<button onclick="printBill()">🧾 In bill</button>

</div>

</div>

<script>
const API="DÁN_LINK_SCRIPT";

let products=[], customers=[], cart=[];

async function load(){
  const res=await fetch(API);
  const data=await res.json();
  products=data.products;
  customers=data.customers;
  render();
}
function render(){
  document.getElementById("products").innerHTML=
    products.map(p=>`
      <div class="product">
        ${p.name} - ${p.le}
        <button onclick="addCart('${p.id}')">Mua</button>
      </div>`).join("");

  document.getElementById("customer").innerHTML=
    customers.map(c=>`<option>${c.name}</option>`).join("");

  renderCart();
}
function addCart(id){
  let p=products.find(x=>x.id==id);
  let i=cart.find(x=>x.id==id);
  if(i) i.qty++; else cart.push({...p,qty:1});
  renderCart();
}
function renderCart(){
  let total=0;
  document.getElementById("cart").innerHTML=
    cart.map(i=>{
      let price=i.custom||i.le;
      let sub=price*i.qty;
      total+=sub;
      return `
        <div class="cart-item">
        ${i.name}
        <input value="${price}" onchange="setPrice('${i.id}',this.value)">
        ${i.qty}
        <button onclick="qty('${i.id}',1)">+</button>
        <button onclick="qty('${i.id}',-1)">-</button>
        </div>`;
    }).join("");

  let discount=Number(discountInput())||0;
  let final=total-discount;

  document.getElementById("total").innerText=final;
  calcChange();
}
function discountInput(){return document.getElementById("discount").value;}
function calcChange(){
  let cash=Number(document.getElementById("cash").value)||0;
  let total=Number(document.getElementById("total").innerText)||0;
  document.getElementById("change").innerText=(cash-total);
}
function qty(id,d){
  let i=cart.find(x=>x.id==id);
  i.qty+=d;
  if(i.qty<=0) cart=cart.filter(x=>x.id!=id);
  renderCart();
}
function setPrice(id,v){
  let i=cart.find(x=>x.id==id);
  i.custom=Number(v);
}
async function addProduct(){
  await fetch(API,{method:"POST",body:JSON.stringify({
    action:"product",
    id:p_id.value,name:p_name.value,le:p_le.value,si:p_si.value
  })});
  load();
}
async function addCustomer(){
  await fetch(API,{method:"POST",body:JSON.stringify({
    action:"customer",
    name:c_name.value,group:c_group.value
  })});
  load();
}
async function saveOrder(){
  await fetch(API,{method:"POST",body:JSON.stringify({
    action:"order",
    cart:cart,
    total:document.getElementById("total").innerText
  })});
  alert("Đã lưu");
}
function printBill(){
  let html="<h3>Kim Ngọc</h3>";
  cart.forEach(i=>html+=`${i.name} x${i.qty}<br>`);
  let w=window.open(); w.document.write(html); w.print();
}
load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart POS All-in-One</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-nav { color: #2563eb; border-top: 2px solid #2563eb; }
        @media print {
            body * { visibility: hidden; }
            #bill-print, #bill-print * { visibility: visible; }
            #bill-print { position: absolute; left: 0; top: 0; width: 80mm; display: block !important; }
        }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <!-- TAB BÁN HÀNG (POS) -->
    <div id="tab-pos" class="tab-content active">
        <header class="bg-blue-600 text-white p-4 sticky top-0 z-10 flex justify-between shadow-lg">
            <h1 class="font-bold">🛒 BÁN HÀNG</h1>
            <button onclick="location.reload()"><i class="fa fa-sync"></i></button>
        </header>
        
        <main class="p-3">
            <!-- Chọn khách -->
            <div class="bg-white p-3 rounded-xl mb-3 shadow-sm">
                <select id="cSelect" class="w-full p-2 border rounded-lg outline-none" onchange="updateCartUI()">
                    <option value="">-- Chọn khách hàng --</option>
                </select>
            </div>

            <!-- Giỏ hàng -->
            <div class="bg-white p-3 rounded-xl shadow-sm min-h-[300px]">
                <div class="flex justify-between items-center mb-3">
                    <span class="font-bold">Giỏ hàng</span>
                    <button onclick="openModal('modal-product-list')" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm">+ Thêm món</button>
                </div>
                <div id="cartItems" class="space-y-3"></div>
                <div class="border-t mt-4 pt-4 flex justify-between items-center">
                    <span class="font-bold text-gray-500">Tổng cộng:</span>
                    <span id="totalVal" class="text-2xl font-black text-red-600">0đ</span>
                </div>
                <button onclick="saveAndPrint()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-4 shadow-lg active:scale-95 transition">XUẤT HOÁ ĐƠN (K80)</button>
            </div>
        </main>
    </div>

    <!-- TAB QUẢN LÝ (ADMIN) -->
    <div id="tab-admin" class="tab-content">
        <header class="bg-gray-800 text-white p-4 sticky top-0 z-10">
            <h1 class="font-bold">⚙️ HỆ THỐNG QUẢN TRỊ</h1>
        </header>
        <main class="p-3 space-y-4">
            <!-- Quản lý Sản phẩm -->
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <div class="flex justify-between mb-2">
                    <h2 class="font-bold">📦 Sản phẩm</h2>
                    <button onclick="openProductForm()" class="text-blue-600 text-sm font-bold">+ Thêm mới</button>
                </div>
                <div id="admin-p-list" class="max-h-60 overflow-y-auto border-t text-sm"></div>
            </div>

            <!-- Quản lý Khách hàng -->
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <div class="flex justify-between mb-2">
                    <h2 class="font-bold">👥 Khách hàng</h2>
                    <button onclick="openCustomerForm()" class="text-green-600 text-sm font-bold">+ Thêm mới</button>
                </div>
                <div id="admin-c-list" class="max-h-60 overflow-y-auto border-t text-sm"></div>
            </div>
        </main>
    </div>

    <!-- FOOTER NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-40">
        <button onclick="showTab('pos')" id="nav-pos" class="flex flex-col items-center active-nav">
            <i class="fa fa-cash-register"></i><span class="text-[10px]">Bán hàng</span>
        </button>
        <button onclick="showTab('admin')" id="nav-admin" class="flex flex-col items-center text-gray-400">
            <i class="fa fa-tools"></i><span class="text-[10px]">Quản lý</span>
        </button>
    </nav>

    <!-- MODAL CHỌN SẢN PHẨM (KHI BÁN) -->
    <div id="modal-product-list" class="fixed inset-0 bg-black/50 z-50 hidden p-4">
        <div class="bg-white w-full h-full rounded-2xl flex flex-col p-4">
            <div class="flex justify-between mb-4">
                <h3 class="font-bold">Chọn sản phẩm</h3>
                <button onclick="closeModal('modal-product-list')" class="text-2xl">&times;</button>
            </div>
            <input type="text" id="pSearch" placeholder="Tìm kiếm..." class="w-full p-2 bg-gray-100 rounded-lg mb-4" oninput="renderPOSProducts()">
            <div id="pos-p-grid" class="grid grid-cols-2 gap-3 overflow-y-auto"></div>
        </div>
    </div>

    <!-- MODAL FORM (THÊM/SỬA) -->
    <div id="modal-form" class="fixed inset-0 bg-black/50 z-50 hidden p-4 flex items-center">
        <div class="bg-white w-full rounded-2xl p-5 shadow-2xl">
            <h3 id="form-title" class="font-bold text-lg mb-4">Thông tin</h3>
            <div id="form-fields" class="space-y-3 max-h-[60vh] overflow-y-auto"></div>
            <div class="flex gap-2 mt-6">
                <button onclick="closeModal('modal-form')" class="flex-1 py-2 bg-gray-200 rounded-xl font-bold">Huỷ</button>
                <button id="btnSave" class="flex-1 py-2 bg-blue-600 text-white rounded-xl font-bold">Lưu lại</button>
            </div>
        </div>
    </div>

    <!-- MẪU IN BILL K80 -->
    <div id="bill-print" class="hidden text-[10pt] font-mono p-2">
        <center>
            <strong>HOÁ ĐƠN BÁN HÀNG</strong><br>
            --------------------------------
        </center>
        <div id="bill-info"></div>
        <table class="w-full my-2 border-t border-black">
            <tbody id="bill-items"></tbody>
        </table>
        <div id="bill-total" class="text-right font-bold border-t border-black pt-1"></div>
        <center class="mt-4">Cảm ơn quý khách!</center>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby04hYPrGtuKQCUfyGS50oHlfHjxhoQ_wP7GL4_3HikJt_2OUyOX5E46Lu0jDRWbOqWrQ/exec";
        let db = { products: [], customers: [] };
        let cart = [];

        async function loadData() {
            const res = await fetch(API_URL);
            db = await res.json();
            renderCustomerSelect();
            renderAdminLists();
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active-nav'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav');
        }

        // --- PHẦN BÁN HÀNG ---
        function renderCustomerSelect() {
            const sel = document.getElementById('cSelect');
            sel.innerHTML = '<option value="">-- Chọn khách hàng --</option>';
            db.customers.forEach(c => {
                sel.innerHTML += `<option value="${c.id}" data-group="${c.group}" data-name="${c.name}">${c.name} (${c.phone})</option>`;
            });
        }

        function renderPOSProducts() {
            const grid = document.getElementById('pos-p-grid');
            const search = document.getElementById('pSearch').value.toLowerCase();
            grid.innerHTML = "";
            db.products.filter(p => p.name.toLowerCase().includes(search)).forEach(p => {
                grid.innerHTML += `
                    <div class="bg-gray-50 border p-2 rounded-xl text-center" onclick="addToCart('${p.id}')">
                        <img src="${p.img}" class="w-full h-20 object-cover rounded-lg mb-1">
                        <div class="text-xs font-bold truncate">${p.name}</div>
                        <div class="text-blue-600 text-xs">${Number(p.le).toLocaleString()}đ</div>
                    </div>`;
            });
        }

        function addToCart(id) {
            const p = db.products.find(x => x.id === id);
            const exist = cart.find(i => i.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            const group = document.getElementById('cSelect').selectedOptions[0].dataset.group || "Khách Lẻ";
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = cart.map((i, idx) => {
                const price = (group === "Khách Sỉ") ? i.si : i.le;
                total += price * i.qty;
                return `<div class="flex justify-between border-b pb-2">
                    <div class="text-sm font-medium">${i.name} <br> <span class="text-xs text-gray-400">${Number(price).toLocaleString()}đ</span></div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${idx},-1)" class="w-6 h-6 bg-gray-200 rounded">-</button>
                        <span>${i.qty}</span>
                        <button onclick="changeQty(${idx},1)" class="w-6 h-6 bg-gray-200 rounded">+</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('totalVal').innerText = total.toLocaleString() + "đ";
        }

        function changeQty(idx, d) {
            cart[idx].qty += d;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCartUI();
        }

        async function saveAndPrint() {
            const c = document.getElementById('cSelect').selectedOptions[0];
            if(!c.value || cart.length === 0) return alert("Thiếu thông tin!");
            
            // Render Bill In
            const totalVal = document.getElementById('totalVal').innerText;
            document.getElementById('bill-info').innerHTML = `Khách: ${c.dataset.name}<br>Ngày: ${new Date().toLocaleString()}`;
            document.getElementById('bill-items').innerHTML = cart.map(i => `<tr><td>${i.name}</td><td class="text-right">${i.qty}</td></tr>`).join('');
            document.getElementById('bill-total').innerText = "TỔNG: " + totalVal;
            
            window.print();

            // Ghi Google Sheets
            const data = { action: "saveOrder", customerName: c.dataset.name, total: totalVal, items: cart };
            await fetch(API_URL, { method: "POST", body: JSON.stringify(data) });
            alert("Đã lưu đơn thành công!");
            cart = []; updateCartUI();
        }

        // --- PHẦN QUẢN LÝ ---
        function renderAdminLists() {
            const pList = document.getElementById('admin-p-list');
            pList.innerHTML = db.products.map(p => `<div class="flex justify-between py-2 border-b"><span>${p.name}</span><button onclick="openProductForm('${p.id}')" class="text-blue-500">Sửa</button></div>`).join('');
            
            const cList = document.getElementById('admin-c-list');
            cList.innerHTML = db.customers.map(c => `<div class="flex justify-between py-2 border-b"><span>${c.name}</span><button onclick="openCustomerForm('${c.id}')" class="text-blue-500">Sửa</button></div>`).join('');
        }

        function openProductForm(id = '') {
            const p = db.products.find(x => x.id === id) || {id:'', cat:'', name:'', unit:'', desc:'', cost:0, si:0, le:0, img:''};
            document.getElementById('form-title').innerText = id ? "Sửa sản phẩm" : "Thêm sản phẩm";
            document.getElementById('form-fields').innerHTML = `
                <input id="f-id" placeholder="Mã hàng" class="w-full p-2 border rounded" value="${p.id}">
                <input id="f-name" placeholder="Tên sản phẩm" class="w-full p-2 border rounded" value="${p.name}">
                <input id="f-cat" placeholder="Nhóm hàng" class="w-full p-2 border rounded" value="${p.cat}">
                <input id="f-unit" placeholder="ĐVT" class="w-full p-2 border rounded" value="${p.unit}">
                <input id="f-cost" type="number" placeholder="Giá nhập" class="w-full p-2 border rounded" value="${p.cost}">
                <input id="f-si" type="number" placeholder="Giá sỉ" class="w-full p-2 border rounded" value="${p.si}">
                <input id="f-le" type="number" placeholder="Giá lẻ" class="w-full p-2 border rounded" value="${p.le}">
                <input id="f-img" placeholder="Link ảnh" class="w-full p-2 border rounded" value="${p.img}">
            `;
            document.getElementById('btnSave').onclick = () => upsert('upsertProduct');
            openModal('modal-form');
        }

        function openCustomerForm(id = '') {
            const c = db.customers.find(x => x.id === id) || {id:'', name:'', group:'Khách Lẻ', phone:''};
            document.getElementById('form-title').innerText = id ? "Sửa khách hàng" : "Thêm khách hàng";
            document.getElementById('form-fields').innerHTML = `
                <input id="f-id" placeholder="Mã khách" class="w-full p-2 border rounded" value="${c.id}">
                <input id="f-name" placeholder="Tên khách hàng" class="w-full p-2 border rounded" value="${c.name}">
                <select id="f-group" class="w-full p-2 border rounded">
                    <option ${c.group=='Khách Lẻ'?'selected':''}>Khách Lẻ</option>
                    <option ${c.group=='Khách Sỉ'?'selected':''}>Khách Sỉ</option>
                </select>
                <input id="f-phone" placeholder="Số điện thoại" class="w-full p-2 border rounded" value="${c.phone}">
            `;
            document.getElementById('btnSave').onclick = () => upsert('upsertCustomer');
            openModal('modal-form');
        }

        async function upsert(action) {
            const item = {};
            document.querySelectorAll('#form-fields [id^="f-"]').forEach(el => {
                item[el.id.replace('f-', '')] = el.value;
            });
            await fetch(API_URL, { method: "POST", body: JSON.stringify({action, item}) });
            alert("Đã lưu!");
            location.reload();
        }

        // --- HELPER ---
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); if(id=='modal-product-list') renderPOSProducts(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        loadData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiot Mini - Pro POS</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease-out; }
        .active-nav { color: #2563eb !important; border-top: 2px solid #2563eb; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        @media print {
            body * { visibility: hidden; }
            #bill-print, #bill-print * { visibility: visible; }
            #bill-print { position: absolute; left: 0; top: 0; width: 80mm; display: block !important; }
        }
    </style>
</head>
<body class="text-gray-900 pb-20">

    <!-- TAB 1: BÁN HÀNG -->
    <div id="tab-pos" class="tab-content active">
        <header class="bg-white border-b p-4 sticky top-0 z-10 flex justify-between items-center shadow-sm">
            <span class="font-black text-xl text-blue-600 tracking-tighter italic">KIOT PRO</span>
            <button onclick="location.reload()" class="text-gray-400 p-2"><i class="fa fa-sync-alt"></i></button>
        </header>
        
        <main class="p-3 space-y-3">
            <!-- Chọn khách hàng -->
            <div class="bg-white rounded-xl shadow-sm border p-3 flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-500">
                    <i class="fa fa-user"></i>
                </div>
                <select id="cSelect" class="flex-1 bg-transparent outline-none font-bold text-gray-700" onchange="updateCartUI()">
                    <!-- Data load từ init -->
                </select>
            </div>

            <!-- Giỏ hàng -->
            <div class="bg-white rounded-xl shadow-sm border p-4 min-h-[45vh] flex flex-col">
                <div class="flex justify-between items-center border-b pb-3 mb-3">
                    <span class="font-bold flex items-center gap-2"><i class="fa fa-shopping-basket text-blue-500"></i> Đơn hàng</span>
                    <button onclick="openModal('modal-select-p')" class="bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-full shadow-lg active:scale-95 transition">+ THÊM MÓN</button>
                </div>
                <div id="cartItems" class="space-y-4 flex-1">
                    <!-- Sản phẩm giỏ hàng hiện ở đây -->
                </div>
            </div>

            <!-- Thanh toán -->
            <div class="bg-white rounded-xl shadow-md border p-4 space-y-3 border-t-4 border-t-blue-500">
                <div class="flex justify-between text-sm text-gray-500">
                    <span>Số lượng mặt hàng</span>
                    <span id="totalItems" class="font-bold text-gray-900">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-lg font-bold">Tổng thanh toán</span>
                    <span id="totalVal" class="text-2xl font-black text-blue-600">0</span>
                </div>
                <button onclick="saveAndPrint()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-blue-200 shadow-xl active:bg-blue-700 transition transform">THANH TOÁN & IN</button>
            </div>
        </main>
    </div>

    <!-- TAB 2: HÀNG HÓA -->
    <div id="tab-products" class="tab-content">
        <header class="bg-white border-b p-4 sticky top-0 z-10 flex justify-between items-center">
            <h1 class="font-bold text-lg">DANH MỤC HÀNG</h1>
            <button onclick="openProductForm()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md">+ THÊM</button>
        </header>
        <main class="p-3">
            <div class="relative mb-4">
                <i class="fa fa-search absolute left-3 top-3 text-gray-400"></i>
                <input type="text" placeholder="Tìm tên sản phẩm..." class="w-full pl-10 pr-4 py-3 bg-white border rounded-xl outline-none shadow-sm focus:border-blue-400" oninput="renderAdminProducts(this.value)">
            </div>
            <div id="admin-p-list" class="space-y-2"></div>
        </main>
    </div>

    <!-- TAB 3: ĐỐI TÁC -->
    <div id="tab-customers" class="tab-content">
        <header class="bg-white border-b p-4 sticky top-0 z-10 flex justify-between items-center">
            <h1 class="font-bold text-lg">ĐỐI TÁC KHÁCH HÀNG</h1>
            <button onclick="openCustomerForm()" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md">+ THÊM</button>
        </header>
        <main class="p-3">
            <div id="admin-c-list" class="space-y-2"></div>
        </main>
    </div>

    <!-- FOOTER TAB BAR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-1 z-50 shadow-2xl">
        <button onclick="showTab('pos')" id="nav-pos" class="flex flex-col items-center gap-1 active-nav py-2 text-gray-400 w-1/3 transition">
            <i class="fa fa-cash-register text-xl"></i><span class="text-[10px] font-bold">Bán hàng</span>
        </button>
        <button onclick="showTab('products')" id="nav-products" class="flex flex-col items-center gap-1 py-2 text-gray-400 w-1/3 transition">
            <i class="fa fa-box-open text-xl"></i><span class="text-[10px] font-bold">Hàng hóa</span>
        </button>
        <button onclick="showTab('customers')" id="nav-customers" class="flex flex-col items-center gap-1 py-2 text-gray-400 w-1/3 transition">
            <i class="fa fa-user-friends text-xl"></i><span class="text-[10px] font-bold">Đối tác</span>
        </button>
    </nav>

    <!-- MODAL CHỌN SẢN PHẨM -->
    <div id="modal-select-p" class="fixed inset-0 bg-black/60 z-[60] hidden flex items-end">
        <div class="bg-white w-full h-[80vh] rounded-t-[2rem] flex flex-col p-5 shadow-2xl overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <span class="font-black text-lg text-gray-700">CHỌN HÀNG HÓA</span>
                <button onclick="closeModal('modal-select-p')" class="w-10 h-10 bg-gray-100 rounded-full text-gray-400 flex items-center justify-center">&times;</button>
            </div>
            <input type="text" id="pSearch" placeholder="Tìm tên hoặc mã hàng..." class="w-full p-4 bg-gray-100 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-blue-400" oninput="renderPOSProducts()">
            <div id="pos-p-grid" class="grid grid-cols-3 gap-3 overflow-y-auto hide-scrollbar pb-10"></div>
        </div>
    </div>

    <!-- FORM MODAL -->
    <div id="modal-form" class="fixed inset-0 bg-black/60 z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl">
            <h3 id="form-title" class="font-black text-lg mb-4 text-blue-600 border-b pb-2 italic">THÔNG TIN</h3>
            <div id="form-fields" class="space-y-4 max-h-[60vh] overflow-y-auto pr-1"></div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal('modal-form')" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold text-gray-500">HỦY</button>
                <button id="btnSave" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">LƯU LẠI</button>
            </div>
        </div>
    </div>

    <!-- BILL IN K80 -->
    <div id="bill-print" class="hidden text-[10pt] font-mono leading-tight p-4">
        <center>
            <strong style="font-size: 16pt;">HÓA ĐƠN BÁN HÀNG</strong><br>
            --------------------------------
        </center>
        <div id="bill-info" class="my-4 space-y-1"></div>
        <table class="w-full border-t border-b border-black my-4 border-dashed">
            <thead><tr class="text-left"><th>Sản phẩm</th><th class="text-right">SL</th></tr></thead>
            <tbody id="bill-items"></tbody>
        </table>
        <div id="bill-total" class="text-right font-black text-[13pt] pt-2"></div>
        <center class="mt-8">
            <p>Cảm ơn & Hẹn gặp lại!</p>
            <div class="text-[8pt] italic text-gray-400">Thiết kế bởi Kiot Pro</div>
        </center>
    </div>

    <script>
        const API_URL = "https://google.com";
        let db = { products: [], customers: [] };
        let cart = [];

        async function init() {
            try {
                const res = await fetch(API_URL);
                const raw = await res.json();
                
                // Chuẩn hóa dữ liệu để đảm bảo i.name, i.si, i.le luôn tồn tại
                db.products = raw.products.map(p => ({
                    id: String(p.id),
                    cat: p.cat || '',
                    name: p.name || 'Không tên',
                    unit: p.unit || 'Cái',
                    si: Number(p.si) || 0,
                    le: Number(p.le) || 0,
                    img: p.img || '',
                    cost: p.cost || 0
                }));
                db.customers = raw.customers;

                renderCustomerSelect();
                renderAdminProducts();
                renderAdminCustomers();
            } catch (e) { alert("Lỗi tải dữ liệu. Hãy kiểm tra kết nối mạng!"); }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active-nav'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active-nav');
        }

        function renderCustomerSelect() {
            const sel = document.getElementById('cSelect');
            sel.innerHTML = '<option value="" data-group="Khách Lẻ">👤 Khách lẻ</option>';
            db.customers.forEach(c => {
                sel.innerHTML += `<option value="${c.id}" data-group="${c.group}" data-name="${c.name}">👤 ${c.name} (${c.group})</option>`;
            });
        }

        function renderPOSProducts() {
            const grid = document.getElementById('pos-p-grid');
            const search = document.getElementById('pSearch').value.toLowerCase();
            grid.innerHTML = "";
            
            db.products.filter(p => p.name.toLowerCase().includes(search)).forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white border border-gray-100 rounded-2xl p-2 text-center active:scale-90 transition shadow-sm" onclick="addToCart('${p.id}')">
                        <img src="${p.img || 'https://placeholder.com'}" class="w-12 h-12 mx-auto object-cover rounded-xl mb-1 shadow-sm border border-gray-50">
                        <div class="text-[9px] font-bold truncate leading-tight h-3 text-gray-600 uppercase">${p.name}</div>
                        <div class="text-blue-600 text-[10px] font-black mt-1">${p.le.toLocaleString()}đ</div>
                    </div>`;
            });
        }

        function addToCart(id) {
            const p = db.products.find(x => x.id === id);
            const exist = cart.find(i => i.id === id);
            if(exist) {
                exist.qty++;
            } else {
                // Đảm bảo gán cứng p.name vào giỏ hàng
                cart.push({...p, qty: 1});
            }
            updateCartUI();
        }

        function updateCartUI() {
            const sel = document.getElementById('cSelect').selectedOptions[0];
            const group = sel.dataset.group || "Khách Lẻ";
            const container = document.getElementById('cartItems');
            let total = 0, count = 0;

            if(cart.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-300">
                        <i class="fa fa-shopping-cart text-5xl mb-2"></i>
                        <p class="text-sm italic">Chưa có hàng hóa...</p>
                    </div>`;
                document.getElementById('totalVal').innerText = "0đ";
                document.getElementById('totalItems').innerText = "0";
                return;
            }

            container.innerHTML = cart.map((i, idx) => {
                const price = (group === "Khách Sỉ") ? i.si : i.le;
                total += price * i.qty;
                count += i.qty;
                return `
                <div class="flex justify-between items-center bg-gray-50/50 p-2 rounded-2xl border border-gray-100">
                    <div class="flex items-center gap-3">
                        <img src="${i.img || 'https://placeholder.com'}" class="w-10 h-10 object-cover rounded-lg border border-white shadow-sm">
                        <div>
                            <div class="font-bold text-sm text-gray-800">${i.name}</div>
                            <div class="text-blue-600 text-xs font-black">${price.toLocaleString()}đ</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 bg-white rounded-full p-1 shadow-inner border">
                        <button onclick="changeQty(${idx},-1)" class="w-7 h-7 flex items-center justify-center bg-gray-50 rounded-full text-red-500 font-black">-</button>
                        <span class="text-xs font-black w-4 text-center">${i.qty}</span>
                        <button onclick="changeQty(${idx},1)" class="w-7 h-7 flex items-center justify-center bg-blue-500 rounded-full text-white font-black">+</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('totalVal').innerText = total.toLocaleString() + "đ";
            document.getElementById('totalItems').innerText = count;
        }

        function changeQty(idx, d) {
            cart[idx].qty += d;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCartUI();
        }

        async function saveAndPrint() {
            const sel = document.getElementById('cSelect').selectedOptions[0];
            const group = sel.dataset.group || "Khách Lẻ";
            if(cart.length === 0) return alert("Vui lòng thêm sản phẩm!");

            // Bill Render
            document.getElementById('bill-info').innerHTML = `
                <div>KHÁCH HÀNG: <strong>${sel.dataset.name || 'Khách lẻ'}</strong></div>
                <div style="font-size: 8pt">Ngày lập: ${new Date().toLocaleString()}</div>
            `;
            document.getElementById('bill-items').innerHTML = cart.map(i => `
                <tr>
                    <td style="padding: 4px 0">${i.name}</td>
                    <td class="text-right">x${i.qty}</td>
                </tr>`).join('');
            document.getElementById('bill-total').innerText = "TỔNG: " + document.getElementById('totalVal').innerText;
            
            window.print();

            const data = { 
                action: "saveOrder", 
                customerName: sel.dataset.name || 'Khách lẻ', 
                total: document.getElementById('totalVal').innerText, 
                items: cart.map(i => ({name: i.name, qty: i.qty, price: (group === "Khách Sỉ" ? i.si : i.le)}))
            };
            
            await fetch(API_URL, { method: "POST", body: JSON.stringify(data) });
            alert("Đã lưu đơn hàng thành công!");
            cart = []; updateCartUI();
        }

        // --- QUẢN LÝ ---
        function renderAdminProducts(filter = "") {
            const list = document.getElementById('admin-p-list');
            list.innerHTML = db.products.filter(p => p.name.toLowerCase().includes(filter.toLowerCase())).map(p => `
                <div class="bg-white p-3 rounded-xl shadow-sm flex items-center justify-between border border-gray-100" onclick="openProductForm('${p.id}')">
                    <div class="flex items-center gap-3">
                        <img src="${p.img || 'https://placeholder.com'}" class="w-12 h-12 rounded-xl object-cover border border-gray-50 shadow-sm">
                        <div>
                            <div class="font-bold text-sm text-gray-800">${p.name}</div>
                            <div class="text-[10px] font-bold text-blue-500">Giá lẻ: ${p.le.toLocaleString()}đ</div>
                        </div>
                    </div>
                    <i class="fa fa-chevron-right text-gray-200"></i>
                </div>`).join('');
        }

        function renderAdminCustomers() {
            const list = document.getElementById('admin-c-list');
            list.innerHTML = db.customers.map(c => `
                <div class="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center border border-gray-100" onclick="openCustomerForm('${c.id}')">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-green-50 text-green-600 rounded-full flex items-center justify-center font-bold border border-green-100">
                            ${c.name.charAt(0)}
                        </div>
                        <div>
                            <div class="font-bold text-sm text-gray-800">${c.name}</div>
                            <div class="text-[10px] text-gray-400">${c.group} • ${c.phone || 'N/A'}</div>
                        </div>
                    </div>
                    <i class="fa fa-chevron-right text-gray-200"></i>
                </div>`).join('');
        }

        function openProductForm(id = '') {
            const p = db.products.find(x => x.id === id) || {id:'', cat:'', name:'', unit:'', cost:0, si:0, le:0, img:''};
            document.getElementById('form-title').innerText = id ? "SỬA HÀNG HÓA" : "THÊM HÀNG HÓA";
            document.getElementById('form-fields').innerHTML = `
                <input id="f-id" placeholder="Mã hàng" class="w-full p-3 bg-gray-50 border rounded-xl" value="${p.id}">
                <input id="f-name" placeholder="Tên sản phẩm" class="w-full p-3 bg-gray-50 border rounded-xl font-bold" value="${p.name}">
                <div class="grid grid-cols-2 gap-2">
                    <input id="f-si" type="number" placeholder="Giá sỉ" class="p-3 bg-gray-50 border rounded-xl" value="${p.si}">
                    <input id="f-le" type="number" placeholder="Giá lẻ" class="p-3 bg-gray-50 border rounded-xl text-blue-600 font-bold" value="${p.le}">
                </div>
                <input id="f-img" placeholder="Link ảnh (Tùy chọn)" class="w-full p-3 bg-gray-50 border rounded-xl text-xs" value="${p.img}">
            `;
            document.getElementById('btnSave').onclick = () => upsert('upsertProduct');
            openModal('modal-form');
        }

        function openCustomerForm(id = '') {
            const c = db.customers.find(x => x.id === id) || {id:'', name:'', group:'Khách Lẻ', phone:''};
            document.getElementById('form-title').innerText = id ? "SỬA ĐỐI TÁC" : "THÊM ĐỐI TÁC";
            document.getElementById('form-fields').innerHTML = `
                <input id="f-id" placeholder="Mã đối tác" class="w-full p-3 bg-gray-50 border rounded-xl" value="${c.id}">
                <input id="f-name" placeholder="Tên đối tác" class="w-full p-3 bg-gray-50 border rounded-xl font-bold" value="${c.name}">
                <select id="f-group" class="w-full p-3 bg-gray-50 border rounded-xl">
                    <option ${c.group=='Khách Lẻ'?'selected':''}>Khách Lẻ</option>
                    <option ${c.group=='Khách Sỉ'?'selected':''}>Khách Sỉ</option>
                </select>
                <input id="f-phone" placeholder="Số điện thoại" class="w-full p-3 bg-gray-50 border rounded-xl" value="${c.phone}">
            `;
            document.getElementById('btnSave').onclick = () => upsert('upsertCustomer');
            openModal('modal-form');
        }

        async function upsert(action) {
            const item = {};
            document.querySelectorAll('#form-fields [id^="f-"]').forEach(el => { item[el.id.replace('f-', '')] = el.value; });
            document.getElementById('btnSave').innerText = "ĐANG LƯU...";
            await fetch(API_URL, { method: "POST", body: JSON.stringify({action, item}) });
            alert("Lưu thành công!");
            location.reload();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); if(id=='modal-select-p') renderPOSProducts(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Toán Đơn Hàng</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4">

    <div class="max-w-xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-200">
        <div class="bg-emerald-600 p-4 text-white">
            <h1 class="text-lg font-bold text-center uppercase tracking-wider">Tính Toán Đơn Hàng Nhanh</h1>
        </div>

        <div class="p-6 space-y-5">
            <!-- PHẦN CHỌN KHÁCH HÀNG -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">1. Chọn Khách Hàng</label>
                <select id="select-khach" onchange="updateLogic()" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-emerald-500 outline-none">
                    <option value="">-- Đang tải dữ liệu --</option>
                </select>
                <div id="info-nhom" class="mt-2 text-xs font-semibold text-emerald-600 italic"></div>
            </div>

            <hr>

            <!-- PHẦN CHỌN SẢN PHẨM -->
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">2. Chọn Sản Phẩm</label>
                <select id="select-sp" onchange="updateLogic()" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-emerald-500 outline-none">
                    <option value="">-- Đang tải dữ liệu --</option>
                </select>
            </div>

            <!-- HIỂN THỊ GIÁ VÀ SỐ LƯỢNG -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Đơn Giá</label>
                    <input type="text" id="hien-gia" readonly class="w-full p-3 bg-gray-100 border-2 border-gray-200 rounded-lg text-red-600 font-bold" value="0">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Số Lượng</label>
                    <input type="number" id="input-sl" value="1" min="1" oninput="tinhTong()" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-emerald-500 outline-none">
                </div>
            </div>

            <!-- KẾT QUẢ TÍNH TOÁN -->
            <div class="bg-gray-900 p-5 rounded-xl">
                <div class="flex justify-between items-center text-white">
                    <span class="text-gray-400 font-medium">TỔNG CỘNG:</span>
                    <span id="hien-tong" class="text-3xl font-black text-yellow-400">0 VNĐ</span>
                </div>
            </div>

            <button onclick="window.location.reload()" class="w-full py-3 bg-gray-200 text-gray-700 font-bold rounded-lg hover:bg-gray-300 transition">
                LÀM MỚI LẠI (XÓA DỮ LIỆU)
            </button>
        </div>
    </div>

    <script>
        // THAY LINK GOOGLE APPS SCRIPT CỦA BẠN VÀO ĐÂY
        const URL_API = "https://script.google.com/macros/s/AKfycbw_MdZkKZBg4zI4mUumdHrMYc7xG8izdHvxsZ0uGdK4FoiKxVLeEn4mtp8SRoGaVVkNPQ/exec";

        let dsKhach = [];
        let dsSanPham = [];

        // Lấy dữ liệu khi mở trang
        window.onload = async () => {
            try {
                const res = await fetch(URL_API);
                const data = await res.json();
                
                dsKhach = data.khach_hang;
                dsSanPham = data.san_pham;

                hienThiDuLieu();
            } catch (e) {
                alert("Lỗi kết nối dữ liệu! Hãy kiểm tra link Apps Script.");
            }
        };

        function hienThiDuLieu() {
            const sKhach = document.getElementById('select-khach');
            const sSP = document.getElementById('select-sp');

            sKhach.innerHTML = '<option value="">-- Chọn một khách hàng --</option>';
            dsKhach.forEach(k => {
                let opt = document.createElement('option');
                opt.value = k[2]; // Cột 2: Nhóm Khách Hàng (Sỉ/Lẻ)
                opt.text = k[1];  // Cột 1: Tên Khách Hàng
                sKhach.appendChild(opt);
            });

            sSP.innerHTML = '<option value="">-- Chọn sản phẩm --</option>';
            dsSanPham.forEach(p => {
                let opt = document.createElement('option');
                opt.text = p[2];      // Cột 2: Tên Sản Phẩm
                opt.dataset.si = p[6]; // Cột 6: Giá Sỉ
                opt.dataset.le = p[7]; // Cột 7: Giá Lẻ
                sSP.appendChild(opt);
            });
        }

        function updateLogic() {
            const nhomKhach = document.getElementById('select-khach').value;
            const itemSP = document.getElementById('select-sp').selectedOptions[0];
            const hienNhom = document.getElementById('info-nhom');
            
            if (!nhomKhach || !itemSP.dataset.si) return;

            // Hiển thị nhóm khách cho người dùng thấy
            hienNhom.innerText = "Áp dụng giá cho khách nhóm: " + nhomKhach;

            // Quyết định lấy cột giá nào
            let gia = (nhomKhach === "Sỉ") ? itemSP.dataset.si : itemSP.dataset.le;
            
            document.getElementById('hien-gia').value = gia;
            tinhTong();
        }

        function tinhTong() {
            const gia = parseInt(document.getElementById('hien-gia').value) || 0;
            const sl = parseInt(document.getElementById('input-sl').value) || 0;
            const tong = gia * sl;
            document.getElementById('hien-tong').innerText = tong.toLocaleString('vi-VN') + " VNĐ";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạp Hoá Kim Ngọc</title>

<style>
body { font-family: sans-serif; margin:0; background:#f5f5f5; }
.container { max-width:600px; margin:auto; padding:10px;}

.shop-header {
  background:#fff; padding:15px; text-align:center;
  border-bottom:2px solid #28a745;
}

.search-box {
  position: sticky; top:0; background:#f5f5f5; padding:10px;
}

#searchInput {
  width:100%; padding:10px; border-radius:20px;
  border:2px solid #28a745;
}

.card {
  background:#fff; padding:10px; margin:10px 0;
  border-radius:10px; display:flex; justify-content:space-between;
}

.cart-box {
  background:#fff; padding:10px; border-radius:10px;
  margin-bottom:10px;
}

button {
  background:#28a745; color:#fff;
  border:none; padding:8px 12px; border-radius:6px;
}
</style>
</head>

<body>

<div class="shop-header">
  <h2>TẠP HOÁ KIM NGỌC</h2>
</div>

<div class="container">

<!-- GIỎ -->
<div class="cart-box">
  <h3>🛒 Đơn hàng</h3>
  <select id="customerSelect"></select>

  <div id="cart"></div>

  <b>Tổng: <span id="total">0</span> đ</b>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input id="searchInput" placeholder="Tìm sản phẩm..." oninput="searchProducts()">
</div>

<!-- PRODUCTS -->
<div id="products">🔍 Nhập để tìm...</div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzcSpINAuj5CKGbdlvDwy-w4IZhl04nI9iMP9xKt-BpRhJ47kzCxxs3B5m4C1CSlcFrlQ/exec";

let cart = [];
let customers = [];
let currentGroup = "Khách Lẻ";
let searchTimeout;

// LOAD KHÁCH
async function loadCustomers(){
  const res = await fetch(API + "?type=customers");
  const data = await res.json();

  customers = data;

  const select = document.getElementById("customerSelect");
  select.innerHTML = "";

  customers.forEach(c=>{
    select.innerHTML += `<option data-group="${c.group}">
      ${c.name} (${c.group})
    </option>`;
  });
}

// SEARCH SẢN PHẨM
function searchProducts(){
  clearTimeout(searchTimeout);

  searchTimeout = setTimeout(async ()=>{
    const kw = document.getElementById("searchInput").value;

    if(kw.length < 2){
      document.getElementById("products").innerHTML = "Nhập ít nhất 2 ký tự...";
      return;
    }

    const res = await fetch(API + "?search=" + encodeURIComponent(kw));
    const data = await res.json();

    displayProducts(data);

  },300);
}

// HIỂN THỊ SP
function displayProducts(data){
  const el = document.getElementById("products");
  el.innerHTML = "";

  data.forEach(p=>{
    el.innerHTML += `
      <div class="card">
        <div>
          ${p.name}<br>
          ${Number(p.le).toLocaleString()} đ
        </div>
        <button onclick="addCart('${p.id}','${p.name}',${p.le},${p.si})">Mua</button>
      </div>`;
  });
}

// THÊM GIỎ
function addCart(id,name,le,si){
  let i = cart.find(x=>x.id==id);

  if(i) i.qty++;
  else cart.push({id,name,le,si,qty:1});

  renderCart();
}

// GIỎ
function renderCart(){
  const el = document.getElementById("cart");
  let total = 0;

  el.innerHTML = "";

  cart.forEach(i=>{
    const price = i.custom || i.le;
    const sub = price * i.qty;
    total += sub;

    el.innerHTML += `
      <div>
        ${i.name}<br>
        <input value="${price}" onchange="setPrice('${i.id}',this.value)">
        x ${i.qty}
      </div>`;
  });

  document.getElementById("total").innerText = total.toLocaleString();
}

function setPrice(id,val){
  let i = cart.find(x=>x.id==id);
  i.custom = Number(val);
  renderCart();
}

// INIT
loadCustomers();
</script>

</body>
</html>

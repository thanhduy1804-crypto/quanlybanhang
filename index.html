<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tạp Hoá Kim Ngọc - POS</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #bill-print { display: none; }
        @media print {
            body * { visibility: hidden; }
            #bill-print, #bill-print * { visibility: visible; }
            #bill-print { display: block !important; position: absolute; left: 0; top: 0; width: 80mm; }
        }
    </style>
</head>
<body class="pb-24">

    <!-- LOADING OVERLAY -->
    <div id="loading" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold text-blue-600">Đang kết nối dữ liệu...</p>
    </div>

    <!-- MÀN HÌNH BÁN HÀNG -->
    <div id="tab-pos" class="tab-content active">
        <header class="bg-white p-4 border-b sticky top-0 z-10 flex justify-between items-center shadow-sm">
            <h1 class="font-black text-blue-600 text-lg">KIM NGỌC POS</h1>
            <button onclick="location.reload()" class="text-gray-400"><i class="fa fa-sync"></i></button>
        </header>

        <main class="p-4 space-y-4">
            <!-- Chọn khách & Loại giá -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border space-y-3">
                <div class="flex items-center gap-3">
                    <i class="fa fa-user-circle text-blue-500 text-xl"></i>
                    <select id="cSelect" class="flex-1 outline-none font-bold text-gray-700 bg-transparent" onchange="updateCartUI()">
                        <option value="" data-group="Khách Lẻ">Khách Lẻ (Mặc định)</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button onclick="setPriceType('le')" id="btn-le" class="flex-1 py-2 rounded-lg font-bold border-2 border-blue-600 bg-blue-600 text-white">GIÁ LẺ</button>
                    <button onclick="setPriceType('si')" id="btn-si" class="flex-1 py-2 rounded-lg font-bold border-2 border-blue-600 text-blue-600">GIÁ SỈ</button>
                </div>
            </div>

            <!-- Giỏ hàng -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border min-h-[40vh] flex flex-col">
                <div class="flex justify-between items-center border-b pb-3 mb-4">
                    <span class="font-bold text-gray-600">Đơn hàng</span>
                    <button onclick="openModal('modal-p')" class="bg-blue-600 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg">+ THÊM HÀNG</button>
                </div>
                <div id="cartItems" class="space-y-4 flex-1"></div>
            </div>

            <!-- Nút thanh toán -->
            <div class="bg-white p-5 rounded-2xl shadow-lg border-t-4 border-blue-600">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-500 font-medium">Tổng tiền (<span id="totalQty">0</span> món)</span>
                    <span id="totalVal" class="text-2xl font-black text-red-600">0đ</span>
                </div>
                <button onclick="saveAndPrint()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg shadow-xl active:scale-95 transition">THANH TOÁN & IN</button>
            </div>
        </main>
    </div>

    <!-- MODAL CHỌN SẢN PHẨM -->
    <div id="modal-p" class="fixed inset-0 bg-black/60 z-50 hidden flex items-end">
        <div class="bg-white w-full h-[85vh] rounded-t-[2rem] p-6 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-lg uppercase">Danh sách hàng hóa</h3>
                <button onclick="closeModal('modal-p')" class="text-2xl text-gray-400">&times;</button>
            </div>
            <input type="text" id="pSearch" placeholder="Tìm tên sản phẩm..." class="w-full p-4 bg-gray-100 rounded-2xl mb-4 outline-none border focus:border-blue-400" oninput="renderPOSProducts()">
            <div id="pos-p-list" class="space-y-3 overflow-y-auto pb-10 flex-1"></div>
        </div>
    </div>

    <script>
        // THAY LINK SCRIPT ĐÃ DEPLOY CỦA BẠN VÀO ĐÂY
        const API_URL = "https://script.google.com/macros/s/AKfycbwGLgt_mKOW7r73TRONd3Zypo9fP9fLMWK3wLCg0PYwvHiYNSXXJlmdnPoR9VZrSx603Q/exec";
        
        let db = { products: [], customers: [] };
        let cart = [];
        let priceType = 'le'; // 'le' hoặc 'si'

        async function init() {
            try {
                // Thêm tham số ngẫu nhiên để tránh trình duyệt cache dữ liệu cũ
                const response = await fetch(API_URL + "?t=" + new Date().getTime());
                if (!response.ok) throw new Error("Network response was not ok");
                
                db = await response.json();
                
                // Đổ dữ liệu khách hàng
                const cSelect = document.getElementById('cSelect');
                db.customers.forEach(c => {
                    cSelect.innerHTML += `<option value="${c.id}" data-group="${c.group}">${c.name} (${c.group})</option>`;
                });

                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error("Lỗi kết nối:", error);
                alert("KHÔNG THỂ KẾT NỐI DỮ LIỆU!\n1. Hãy chắc chắn bạn đã Deploy Apps Script ở chế độ 'Anyone'.\n2. Kiểm tra lại URL API.");
            }
        }

        function setPriceType(type) {
            priceType = type;
            document.getElementById('btn-le').className = type === 'le' ? 'flex-1 py-2 rounded-lg font-bold border-2 border-blue-600 bg-blue-600 text-white' : 'flex-1 py-2 rounded-lg font-bold border-2 border-blue-600 text-blue-600';
            document.getElementById('btn-si').className = type === 'si' ? 'flex-1 py-2 rounded-lg font-bold border-2 border-blue-600 bg-blue-600 text-white' : 'flex-1 py-2 rounded-lg font-bold border-2 border-blue-600 text-blue-600';
            updateCartUI();
        }

        function renderPOSProducts() {
            const list = document.getElementById('pos-p-list');
            const kw = document.getElementById('pSearch').value.toLowerCase();
            list.innerHTML = "";
            
            db.products.filter(p => p.name.toLowerCase().includes(kw)).forEach(p => {
                const price = priceType === 'si' ? p.si : p.le;
                list.innerHTML += `
                    <div class="flex items-center justify-between p-3 border rounded-2xl bg-white shadow-sm active:bg-blue-50" onclick="addToCart('${p.id}')">
                        <div class="flex-1 pr-3">
                            <div class="font-bold text-sm text-gray-800">${p.name}</div>
                            <div class="text-blue-600 font-black mt-1">${Number(price).toLocaleString()}đ</div>
                        </div>
                        <img src="${p.img || 'https://placeholder.com'}" class="w-14 h-14 object-cover rounded-xl border">
                    </div>`;
            });
        }

        function addToCart(id) {
            const p = db.products.find(x => x.id === id);
            const exist = cart.find(i => i.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cartItems');
            let total = 0, count = 0;

            if(cart.length === 0) {
                container.innerHTML = '<p class="text-center py-10 text-gray-400 italic">Giỏ hàng trống</p>';
                document.getElementById('totalVal').innerText = "0đ";
                document.getElementById('totalQty').innerText = "0";
                return;
            }

            container.innerHTML = cart.map((i, idx) => {
                const price = priceType === 'si' ? i.si : i.le;
                total += price * i.qty;
                count += i.qty;
                return `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded-xl border">
                    <div class="flex items-center gap-3">
                        <img src="${i.img || 'https://placeholder.com'}" class="w-10 h-10 object-cover rounded-lg border">
                        <div>
                            <div class="font-bold text-xs">${i.name}</div>
                            <div class="text-blue-600 text-[10px] font-black">${price.toLocaleString()}đ</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${idx},-1)" class="w-7 h-7 bg-white rounded-full shadow text-red-500 font-bold">-</button>
                        <span class="text-xs font-black">${i.qty}</span>
                        <button onclick="changeQty(${idx},1)" class="w-7 h-7 bg-blue-600 rounded-full shadow text-white font-bold">+</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('totalVal').innerText = total.toLocaleString() + "đ";
            document.getElementById('totalQty').innerText = count;
        }

        function changeQty(idx, d) {
            cart[idx].qty += d;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCartUI();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); renderPOSProducts(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        init();
    </script>
</body>
</html>

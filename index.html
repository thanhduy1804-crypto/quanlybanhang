<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Giỏ Hàng Thông Minh</title>
    <script src="https://tailwindcss.com"></script>
    <link href="https://cloudflare.com" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- HEADER -->
    <div class="bg-blue-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg">POS Mini App</h1>
            <div class="relative">
                <i class="fa-solid fa-cart-shopping text-2xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">0</span>
            </div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- BÊN TRÁI: CHỌN KHÁCH & SẢN PHẨM -->
        <div class="md:col-span-2 space-y-6">
            <!-- Chọn Khách Hàng -->
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <label class="block text-sm font-bold text-gray-700 mb-2">1. Thông tin khách hàng</label>
                <select id="select-khach" onchange="changeCustomer()" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">-- Chọn khách hàng --</option>
                </select>
                <div id="badge-nhom" class="mt-2 hidden">
                    <span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-1 rounded-md font-bold uppercase">Nhóm: <span id="label-nhom">--</span></span>
                </div>
            </div>

            <!-- Danh sách sản phẩm -->
            <div class="bg-white p-4 rounded-xl shadow-sm">
                <label class="block text-sm font-bold text-gray-700 mb-4">2. Danh sách sản phẩm</label>
                <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Sản phẩm sẽ render ở đây -->
                    <p class="text-gray-400 text-sm italic">Đang tải dữ liệu...</p>
                </div>
            </div>
        </div>

        <!-- BÊN PHẢI: GIỎ HÀNG -->
        <div class="md:col-span-1">
            <div class="bg-white rounded-xl shadow-lg sticky top-20 overflow-hidden">
                <div class="bg-gray-800 text-white p-3 text-center font-bold">GIỎ HÀNG</div>
                
                <div id="cart-items" class="p-3 max-h-[400px] overflow-y-auto space-y-3">
                    <p class="text-center text-gray-400 py-10 text-sm">Chưa có sản phẩm nào</p>
                </div>

                <div class="p-4 border-t border-gray-100 bg-gray-50">
                    <div class="flex justify-between mb-2">
                        <span class="text-gray-500">Tổng cộng:</span>
                        <span id="total-price" class="font-bold text-red-600 text-xl">0đ</span>
                    </div>
                    <button onclick="checkout()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition active:scale-95">
                        XÁC NHẬN ĐƠN HÀNG
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "DÁN_LINK_WEB_APP_CỦA_BẠN_VÀO_ĐÂY";
        
        let products = [];
        let customers = [];
        let cart = [];
        let currentGroup = "Lẻ"; // Mặc định là lẻ

        window.onload = async () => {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                products = data.san_pham;
                customers = data.khach_hang;
                renderApp();
            } catch (e) { alert("Lỗi tải dữ liệu!"); }
        };

        function renderApp() {
            // Render Khách hàng
            const sKhach = document.getElementById('select-khach');
            customers.forEach(k => {
                let opt = document.createElement('option');
                opt.value = k[2]; // Giả định cột 2 là Nhóm (Sỉ/Lẻ)
                opt.text = k[1];  // Giả định cột 1 là Tên KH
                sKhach.appendChild(opt);
            });

            // Render Sản phẩm
            const pList = document.getElementById('product-list');
            pList.innerHTML = '';
            products.forEach((p, index) => {
                pList.innerHTML += `
                    <div class="border border-gray-100 p-3 rounded-lg hover:border-blue-300 transition shadow-sm">
                        <div class="font-bold text-gray-800">${p[2]}</div>
                        <div class="text-[10px] text-gray-400 mb-2">Mã: ${p[0]}</div>
                        <div class="flex justify-between items-center">
                            <span class="text-blue-600 font-bold">${parseInt(p[7]).toLocaleString()}đ</span>
                            <button onclick="addToCart(${index})" class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-blue-700 shadow-lg">
                                <i class="fa-solid fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function changeCustomer() {
            const select = document.getElementById('select-khach');
            currentGroup = select.value || "Lẻ";
            
            document.getElementById('badge-nhom').classList.toggle('hidden', !select.value);
            document.getElementById('label-nhom').innerText = currentGroup;
            
            updateCartUI(); // Cập nhật lại giá trong giỏ hàng khi đổi nhóm khách
        }

        function addToCart(index) {
            const p = products[index];
            const found = cart.find(item => item.id === p[0]);
            
            if (found) {
                found.qty++;
            } else {
                cart.push({ id: p[0], name: p[2], giaSi: p[6], giaLe: p[7], qty: 1 });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartContainer = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const totalPrice = document.getElementById('total-price');
            
            if (cart.length === 0) {
                cartContainer.innerHTML = '<p class="text-center text-gray-400 py-10 text-sm">Chưa có sản phẩm nào</p>';
                totalPrice.innerText = '0đ';
                cartCount.innerText = '0';
                return;
            }

            let total = 0;
            cartContainer.innerHTML = '';
            
            cart.forEach((item, i) => {
                // Tự động chọn giá theo nhóm khách
                const giaApDung = (currentGroup === "Sỉ") ? item.giaSi : item.giaLe;
                const thanhTien = giaApDung * item.qty;
                total += thanhTien;

                cartContainer.innerHTML += `
                    <div class="flex justify-between items-start border-b border-gray-50 pb-2">
                        <div class="flex-1">
                            <div class="text-xs font-bold text-gray-700">${item.name}</div>
                            <div class="text-[10px] text-gray-400">${parseInt(giaApDung).toLocaleString()}đ x ${item.qty}</div>
                        </div>
                        <div class="flex flex-col items-end">
                            <div class="text-xs font-bold text-blue-600">${thanhTien.toLocaleString()}đ</div>
                            <button onclick="removeFromCart(${i})" class="text-red-400 text-[10px] mt-1"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });

            totalPrice.innerText = total.toLocaleString() + 'đ';
            cartCount.innerText = cart.reduce((sum, item) => sum + item.qty, 0);
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            updateCartUI();
        }

        async function checkout() {
            if (cart.length === 0) return alert("Giỏ hàng trống!");
            alert("Đã ghi nhận đơn hàng thành công!");
            console.log("Dữ liệu gửi đi:", { khach: document.getElementById('select-khach').options[document.getElementById('select-khach').selectedIndex].text, chiTiet: cart });
            cart = [];
            updateCartUI();
        }
    </script>
</body>
</html>

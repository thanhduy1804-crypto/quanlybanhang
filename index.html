<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Quản lý Tạp Hoá Kim Ngọc</title>
  <script src="https://tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cloudflare.com">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; pb-24 }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    #bill-print { display: none; }
    @media print {
      body * { visibility: hidden; }
      #bill-print, #bill-print * { visibility: visible; }
      #bill-print { display: block !important; position: absolute; left: 0; top: 0; width: 80mm; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="bg-white border-b p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
    <h1 class="font-black text-xl text-green-600 italic tracking-tighter">KIM NGỌC POS</h1>
    <button onclick="location.reload()" class="text-gray-400 p-2"><i class="fa fa-sync-alt"></i></button>
  </header>

  <!-- MÀN HÌNH BÁN HÀNG -->
  <div id="tab-pos" class="tab-content active p-3 space-y-4">
    <section class="bg-white rounded-2xl shadow-md border border-green-100 overflow-hidden">
        <div class="bg-green-600 p-3 flex justify-between items-center text-white">
            <span class="font-bold flex items-center gap-2"><i class="fa fa-shopping-basket"></i> ĐƠN HÀNG</span>
            <span id="priceStatus" class="text-[10px] bg-green-700 px-2 py-1 rounded-full font-bold uppercase">Giá: Lẻ</span>
        </div>
        <div class="p-3 border-b bg-green-50">
            <select id="cSelect" class="w-full bg-transparent outline-none font-bold text-sm text-green-800" onchange="changeCustomer()">
                <option value="" data-group="Khách Lẻ">-- Chọn khách hàng --</option>
            </select>
        </div>
        <div id="cartItems" class="p-3 space-y-3 max-h-[300px] overflow-y-auto min-h-[80px]"></div>
        <div class="p-3 bg-gray-50 border-t flex justify-between items-center font-black text-red-600">
            <span class="text-xs text-gray-400">TỔNG CỘNG</span>
            <span id="totalVal" class="text-2xl">0đ</span>
        </div>
    </section>

    <div class="relative">
        <i class="fa fa-search absolute left-4 top-3.5 text-gray-400"></i>
        <input type="text" id="pSearch" placeholder="Tìm tên sản phẩm..." class="w-full pl-11 pr-4 py-3 bg-white border-2 border-green-200 rounded-2xl outline-none shadow-sm" oninput="renderProducts()">
    </div>

    <div id="productList" class="space-y-3 pb-24"></div>
  </div>

  <!-- MÀN HÌNH QUẢN LÝ (THÊM/SỬA) -->
  <div id="tab-admin" class="tab-content p-4 space-y-6">
    <div class="bg-white p-5 rounded-2xl shadow-sm border">
        <h3 class="font-bold text-lg mb-4 text-blue-600 italic">📦 QUẢN LÝ HÀNG HÓA</h3>
        <button onclick="openProductForm()" class="w-full bg-blue-50 text-blue-600 border border-blue-200 py-2 rounded-xl mb-4 font-bold">+ Thêm sản phẩm mới</button>
        <div id="admin-p-list" class="space-y-2 max-h-64 overflow-y-auto"></div>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm border">
        <h3 class="font-bold text-lg mb-4 text-purple-600 italic">👥 QUẢN LÝ KHÁCH HÀNG</h3>
        <button onclick="openCustomerForm()" class="w-full bg-purple-50 text-purple-600 border border-purple-200 py-2 rounded-xl mb-4 font-bold">+ Thêm khách hàng mới</button>
        <div id="admin-c-list" class="space-y-2 max-h-64 overflow-y-auto"></div>
    </div>
  </div>

  <!-- FOOTER NAVIGATION -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50">
    <button onclick="showTab('pos')" class="flex flex-col items-center gap-1 text-green-600 font-bold">
        <i class="fa fa-cash-register text-xl"></i><span class="text-[10px]">Bán hàng</span>
    </button>
    <button onclick="showTab('admin')" class="flex flex-col items-center gap-1 text-gray-400 font-bold">
        <i class="fa fa-tools text-xl"></i><span class="text-[10px]">Quản lý</span>
    </button>
  </nav>

  <!-- MODAL FORM (CHUNG CHO THÊM/SỬA) -->
  <div id="modal-form" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
        <h3 id="form-title" class="font-black text-lg mb-5 text-gray-800 border-b pb-2 uppercase">Thông tin</h3>
        <div id="form-fields" class="space-y-4"></div>
        <div class="flex gap-3 mt-8">
            <button onclick="closeModal()" class="flex-1 py-3 bg-gray-100 rounded-2xl font-bold text-gray-500">HỦY</button>
            <button id="btnSave" class="flex-1 py-3 bg-green-600 text-white rounded-2xl font-bold">LƯU LẠI</button>
        </div>
    </div>
  </div>

  <!-- THANH THANH TOÁN (Chỉ hiện ở Tab Bán hàng) -->
  <footer id="footer-pay" class="fixed bottom-[75px] left-0 right-0 p-3 z-40">
    <button onclick="saveAndPrint()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black text-lg shadow-xl flex justify-center items-center gap-3">
        <i class="fa fa-print text-xl"></i> THANH TOÁN & IN
    </button>
  </footer>

  <div id="bill-print"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwGLgt_mKOW7r73TRONd3Zypo9fP9fLMWK3wLCg0PYwvHiYNSXXJlmdnPoR9VZrSx603Q/exec
";
    let db = { products: [], customers: [] };
    let cart = [];
    let currentGroup = "Khách Lẻ";

    async function init() {
        const res = await fetch(API_URL);
        db = await res.json();
        renderCustomerSelect();
        renderProducts();
        renderAdminLists();
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('footer-pay').style.display = tab === 'pos' ? 'block' : 'none';
        document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-green-600', 'text-gray-400'));
        event.currentTarget.classList.replace('text-gray-400', 'text-green-600');
    }

    function renderCustomerSelect() {
        const sel = document.getElementById('cSelect');
        sel.innerHTML = '<option value="" data-group="Khách Lẻ">-- Chọn khách hàng --</option>';
        db.customers.forEach(c => {
            sel.innerHTML += `<option value="${c.id}" data-group="${c.group}" data-name="${c.name}">${c.name}</option>`;
        });
    }

    function renderProducts() {
        const list = document.getElementById('productList');
        const kw = document.getElementById('pSearch').value.toLowerCase();
        list.innerHTML = "";
        db.products.filter(p => p.name.toLowerCase().includes(kw)).forEach(p => {
            list.innerHTML += `
                <div class="bg-white p-3 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100 active:bg-green-50 transition" onclick="addToCart('${p.id}')">
                    <div class="flex-1 pr-3">
                        <div class="font-bold text-sm text-gray-700 leading-tight">${p.name}</div>
                        <div class="text-green-600 font-black text-lg mt-1">${Number(p.le).toLocaleString()}đ</div>
                    </div>
                    <img src="${p.img || 'https://placeholder.com'}" class="w-16 h-16 object-cover rounded-xl border">
                </div>`;
        });
    }

    function addToCart(id) {
        const p = db.products.find(x => x.id === id);
        const exist = cart.find(i => i.id === id);
        if(exist) exist.qty++; else cart.push({...p, qty: 1});
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        let total = 0;
        if(cart.length === 0) {
            container.innerHTML = '<div class="text-center py-6 text-gray-400 text-xs italic">Giỏ hàng đang trống...</div>';
            document.getElementById('totalVal').innerText = "0đ";
            return;
        }
        container.innerHTML = cart.map((i, idx) => {
            const price = (currentGroup === "Khách Sỉ") ? i.si : i.le;
            total += price * i.qty;
            return `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded-xl border border-gray-200">
                    <div class="flex items-center gap-2">
                        <img src="${i.img || 'https://placeholder.com'}" class="w-10 h-10 object-cover rounded-lg">
                        <div>
                            <div class="font-bold text-[11px] truncate w-24">${i.name}</div>
                            <div class="text-green-600 text-[10px] font-black">${Number(price).toLocaleString()}đ</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${idx},-1)" class="w-7 h-7 bg-white rounded-full shadow text-red-500 font-bold">-</button>
                        <span class="text-xs font-black">${i.qty}</span>
                        <button onclick="changeQty(${idx},1)" class="w-7 h-7 bg-green-600 rounded-full text-white">+</button>
                    </div>
                </div>`;
        }).join('');
        document.getElementById('totalVal').innerText = total.toLocaleString() + "đ";
    }

    function changeQty(idx, d) {
        cart[idx].qty += d;
        if(cart[idx].qty <= 0) cart.splice(idx, 1);
        updateCartUI();
    }

    function changeCustomer() {
        const sel = document.getElementById('cSelect').selectedOptions;
        currentGroup = sel.dataset.group || "Khách Lẻ";
        document.getElementById('priceStatus').innerText = "Giá: " + (currentGroup === "Khách Sỉ" ? "Sỉ" : "Lẻ");
        updateCartUI();
    }

    // --- LOGIC QUẢN LÝ ---
    function renderAdminLists() {
        document.getElementById('admin-p-list').innerHTML = db.products.map(p => `
            <div class="flex justify-between items-center p-3 border-b text-sm" onclick="openProductForm('${p.id}')">
                <span>${p.name}</span>
                <i class="fa fa-edit text-blue-500"></i>
            </div>`).join('');
        document.getElementById('admin-c-list').innerHTML = db.customers.map(c => `
            <div class="flex justify-between items-center p-3 border-b text-sm" onclick="openCustomerForm('${c.id}')">
                <span>${c.name} (${c.group})</span>
                <i class="fa fa-edit text-purple-500"></i>
            </div>`).join('');
    }

    function openProductForm(id = '') {
        const p = db.products.find(x => x.id === id) || {id:'', cat:'', name:'', unit:'', si:0, le:0, img:''};
        document.getElementById('form-title').innerText = id ? "Sửa sản phẩm" : "Thêm sản phẩm";
        document.getElementById('form-fields').innerHTML = `
            <input id="f-id" placeholder="Mã hàng" class="w-full p-3 bg-gray-50 border rounded-xl" value="${p.id}">
            <input id="f-name" placeholder="Tên sản phẩm" class="w-full p-3 bg-gray-50 border rounded-xl font-bold" value="${p.name}">
            <div class="grid grid-cols-2 gap-2">
                <input id="f-si" type="number" placeholder="Giá sỉ" class="p-3 bg-gray-50 border rounded-xl" value="${p.si}">
                <input id="f-le" type="number" placeholder="Giá lẻ" class="p-3 bg-gray-50 border rounded-xl text-green-600 font-bold" value="${p.le}">
            </div>
            <input id="f-img" placeholder="Link ảnh" class="w-full p-3 bg-gray-50 border rounded-xl text-xs" value="${p.img}">
        `;
        document.getElementById('btnSave').onclick = () => upsert('upsertProduct');
        document.getElementById('modal-form').classList.remove('hidden');
    }

    function openCustomerForm(id = '') {
        const c = db.customers.find(x => x.id === id) || {id:'', name:'', group:'Khách Lẻ', phone:''};
        document.getElementById('form-title').innerText = id ? "Sửa khách hàng" : "Thêm khách hàng";
        document.getElementById('form-fields').innerHTML = `
            <input id="f-id" placeholder="Mã khách" class="w-full p-3 bg-gray-50 border rounded-xl" value="${c.id}">
            <input id="f-name" placeholder="Tên khách hàng" class="w-full p-3 bg-gray-50 border rounded-xl font-bold" value="${c.name}">
            <select id="f-group" class="w-full p-3 bg-gray-50 border rounded-xl">
                <option value="Khách Lẻ" ${c.group==='Khách Lẻ'?'selected':''}>Khách Lẻ</option>
                <option value="Khách Sỉ" ${c.group==='Khách Sỉ'?'selected':''}>Khách Sỉ</option>
            </select>
            <input id="f-phone" placeholder="Số điện thoại" class="w-full p-3 bg-gray-50 border rounded-xl" value="${c.phone}">
        `;
        document.getElementById('btnSave').onclick = () => upsert('upsertCustomer');
        document.getElementById('modal-form').classList.remove('hidden');
    }

    async function upsert(action) {
        const item = {};
        document.querySelectorAll('#form-fields [id^="f-"]').forEach(el => { item[el.id.replace('f-', '')] = el.value; });
        document.getElementById('btnSave').innerText = "ĐANG LƯU...";
        await fetch(API_URL, { method: "POST", body: JSON.stringify({action, item}) });
        location.reload();
    }

    function closeModal() { document.getElementById('modal-form').classList.add('hidden'); }

    init();
  </script>
</body>
</html>
